pre-commit:
  commands:
    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}
    oxfmt:
      glob: "*.{ts,json,jsonc,yaml,yml,md,toml,css,html}"
      run: bunx oxfmt --check {staged_files}
    oxlint:
      glob: "*.ts"
      exclude:
        - "**/next-env.d.ts"
      run: bunx oxlint {staged_files}
    # Per-package tsc/test: each command's `glob` keeps lefthook from running
    # it unless a staged file actually belongs to that package. The previous
    # `--filter horse-racing-records` matched no workspace package, so every
    # commit that touched a *.ts file outside the (non-existent) target
    # package exited with "No packages matched the filter".
    tsc-pc-keiba-viewer:
      glob: "apps/pc-keiba-viewer/**/*.{ts,tsx}"
      run: bun run --filter pc-keiba-viewer tsc
    # test:coverage enforces the vitest thresholds (all >= 95) so coverage
    # cannot regress without an explicit threshold change.
    test-pc-keiba-viewer:
      glob: "apps/pc-keiba-viewer/**/*.{ts,tsx}"
      run: bun run --filter pc-keiba-viewer test:coverage
    tsc-sync-realtime-data:
      glob: "apps/sync-realtime-data/**/*.ts"
      run: bun run --filter sync-realtime-data tsc
    # test:coverage enforces the vitest thresholds (all >= 95) so coverage
    # cannot regress without an explicit threshold change.
    test-sync-realtime-data:
      glob: "apps/sync-realtime-data/**/*.ts"
      run: bun run --filter sync-realtime-data test:coverage
    tsc-sync-realtime-data-hot:
      glob: "apps/sync-realtime-data-hot/**/*.ts"
      run: bun run --filter sync-realtime-data-hot tsc
    # test:coverage enforces the vitest thresholds (all >= 95) so coverage
    # cannot regress without an explicit threshold change.
    test-sync-realtime-data-hot:
      glob: "apps/sync-realtime-data-hot/**/*.ts"
      run: bun run --filter sync-realtime-data-hot test:coverage
    tsc-sync-realtime-data-features:
      glob: "apps/sync-realtime-data-features/**/*.ts"
      run: bun run --filter sync-realtime-data-features tsc
    # test:coverage enforces the vitest thresholds (all >= 95) so coverage
    # cannot regress without an explicit threshold change.
    test-sync-realtime-data-features:
      glob: "apps/sync-realtime-data-features/**/*.ts"
      run: bun run --filter sync-realtime-data-features test:coverage
    tsc-pipeline-health-monitor:
      glob: "apps/pipeline-health-monitor/**/*.ts"
      run: bun run --filter pipeline-health-monitor tsc
    # test:coverage enforces the vitest thresholds (all >= 95) so coverage
    # cannot regress without an explicit threshold change.
    test-pipeline-health-monitor:
      glob: "apps/pipeline-health-monitor/**/*.ts"
      run: bun run --filter pipeline-health-monitor test:coverage
    tsc-finish-position-cron:
      glob: "apps/finish-position-cron/**/*.ts"
      run: bun run --filter finish-position-cron tsc
    # test:coverage enforces the vitest thresholds (all >= 95) so coverage
    # cannot regress without an explicit threshold change.
    test-finish-position-cron:
      glob: "apps/finish-position-cron/**/*.ts"
      run: bun run --filter finish-position-cron test:coverage
    tsc-horse-racing-duckdb:
      glob: "apps/horse-racing-duckdb/**/*.ts"
      run: bun run --filter horse-racing-duckdb tsc
    test-horse-racing-duckdb:
      glob: "apps/horse-racing-duckdb/**/*.ts"
      run: bun run --filter horse-racing-duckdb test
    # test:coverage enforces the vitest thresholds (all >= 95) so coverage
    # cannot regress without an explicit threshold change.
    test-local-postgresql:
      glob: "apps/local-postgresql/**/*.ts"
      run: bun run --filter local-postgresql test:coverage
    tsc-horse-racing-realtime:
      glob: "packages/horse-racing-realtime/**/*.ts"
      run: bun run --filter horse-racing-realtime tsc
    test-horse-racing-realtime:
      glob: "packages/horse-racing-realtime/**/*.ts"
      run: bun run --filter horse-racing-realtime test
    tsc-horse-racing-schema:
      glob: "packages/horse-racing-schema/**/*.ts"
      run: bun run --filter horse-racing-schema tsc
    test-horse-racing-schema:
      glob: "packages/horse-racing-schema/**/*.ts"
      run: bun run --filter horse-racing-schema test
    tsc-catboost-json-tree:
      glob: "packages/catboost-json-tree/**/*.ts"
      run: bun run --filter catboost-json-tree tsc
    # test:coverage enforces the vitest thresholds (all >= 95) so coverage
    # cannot regress without an explicit threshold change.
    test-catboost-json-tree:
      glob: "packages/catboost-json-tree/**/*.ts"
      run: bun run --filter catboost-json-tree test:coverage
    # scripts/ 配下 Python (pywinauto 自動化など) の品質チェック。
    # ruff/ty/basedpyright/pytest はプロジェクト全体に対して動くので {staged_files} は渡さない。
    # NOTE: gobwas matcher (lefthook default) では `dir/**/*.py` は dir 直下を match しないので
    # top-level (`dir/*.py`) と nested (`dir/**/*.py`) の両方を multi-glob array で列挙する。
    scripts-ruff:
      glob:
        - "scripts/*.{py,pyi}"
        - "scripts/**/*.{py,pyi}"
      run: cd scripts && uv run ruff check
    scripts-ty:
      glob:
        - "scripts/*.{py,pyi}"
        - "scripts/**/*.{py,pyi}"
      run: cd scripts && uv run ty check
    scripts-pyright:
      glob:
        - "scripts/*.{py,pyi}"
        - "scripts/**/*.{py,pyi}"
      run: cd scripts && uv run basedpyright
    scripts-pytest:
      glob:
        - "scripts/*.{py,pyi}"
        - "scripts/**/*.{py,pyi}"
      run: cd scripts && uv run pytest
    # apps/pc-keiba-viewer/src/scripts/ 配下 Python (corner_lightgbm / finish_position_* / running_style_* 等)
    # の品質チェック。 python:check が ruff + ty + basedpyright + pytest --cov-fail-under=95 を一括実行する。
    python-pc-keiba-viewer:
      glob:
        - "apps/pc-keiba-viewer/src/scripts/*.{py,pyi}"
        - "apps/pc-keiba-viewer/src/scripts/**/*.{py,pyi}"
      run: bun run --filter pc-keiba-viewer python:check
    # apps/finish-position-predict-container/ 配下 Python (Cloudflare Container の
    # 着順予測 predict_lib + entrypoint)。 python:check が ruff + basedpyright +
    # pytest --cov-fail-under=95 (predict_lib) を一括実行する。
    python-finish-position-predict-container:
      glob:
        - "apps/finish-position-predict-container/src/*.{py,pyi}"
        - "apps/finish-position-predict-container/src/**/*.{py,pyi}"
        - "apps/finish-position-predict-container/tests/*.{py,pyi}"
      run: cd apps/finish-position-predict-container && bun run python:check
