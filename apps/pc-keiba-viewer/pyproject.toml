[project]
name = "pc-keiba-viewer-python"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
  "catboost>=1.2.10",
  "duckdb>=1.1.0",
  "lightgbm>=4.6.0",
  "mlx>=0.31.0",
  "numpy>=2.0.0",
  "optuna>=4.0.0",
  "pandas>=2.2.0",
  "psutil>=5.9.0",
  "psycopg[binary]>=3.2.0",
  "pyarrow>=17.0.0",
  "scikit-learn>=1.6.0",
  "xgboost>=3.2.0",
]

[dependency-groups]
dev = [
  "basedpyright>=1.34.0",
  "mccabe>=0.7.0",
  "pandas-stubs>=2.2.0",
  "pytest>=8.4.0",
  "pytest-cov>=7.0.0",
  "scikit-learn-stubs>=0.0.3",
  "ty>=0.0.35",
]

[tool.basedpyright]
include = ["src/scripts", "tests"]
exclude = ["tmp", ".next", ".open-next", "node_modules"]
extraPaths = ["src/scripts", "src/scripts/finish-position-features"]
pythonVersion = "3.12"
typeCheckingMode = "strict"
reportAny = "none"
reportExplicitAny = "error"
reportImplicitOverride = "error"
reportImportCycles = "error"
reportMissingTypeStubs = "error"
reportPrivateLocalImportUsage = "error"
reportUnannotatedClassAttribute = "error"
reportUnknownArgumentType = "none"
reportUnknownLambdaType = "none"
reportUnknownMemberType = "none"
reportUnknownParameterType = "error"
reportUnknownVariableType = "none"

[tool.ty.environment]
extra-paths = ["src/scripts", "src/scripts/finish-position-features"]
python = ".venv/bin/python"

[tool.pytest.ini_options]
addopts = "--cov=corner_lightgbm --cov=finish_position_lightgbm --cov=finish_position_features_duckdb --cov=finish_position_transformer --cov=insert_bucket_evaluation_row --cov=running_style_feature_version --cov=generate_running_style_features_local --cov=score_running_style_local --cov=finish_position_version --cov=generate_finish_position_features_local --cov=score_finish_position_local --cov=score_finish_position_walk_forward --cov=load_bucket_predictions --cov=insert_running_style_bucket_evaluation_row --cov=load_running_style_predictions --cov=verify_running_style_inference_parity --cov=evaluate_running_style_pipeline --cov=aggregate_bucket_eval_duckdb --cov=walk_forward_common --cov=train_finish_position_catboost_walk_forward --cov=train_finish_position_xgboost_walk_forward --cov=train_finish_position_lightgbm_walk_forward --cov=calibrate_finish_position --cov=train_finish_position_stacking_metalearner --cov=train_finish_position_lgbm_stacking --cov=train_finish_position_stacking_meta --cov=tune_finish_position_nar_xgb --cov=tune_finish_position_jra_cb --cov=add_class_features --cov=add_relationship_r1_features --cov=add_pacestyle_features --cov=per_class_ensemble_lib --cov=optimize_per_class_ensemble --cov=add_market_signal_features --cov=add_futan_juryo_features --cov=upcoming_feature_completeness_guard --cov=rs_keibajo_impute --cov-report=term-missing --cov-fail-under=95"
pythonpath = ["src/scripts", "src/scripts/finish-position-features"]
testpaths = ["tests"]

[tool.coverage.run]
branch = true
omit = ["src/scripts/finish_position_transformer/__main__.py"]

[tool.coverage.report]
exclude_lines = ["if __name__ == .__main__.:", "raise SystemExit"]
show_missing = true
